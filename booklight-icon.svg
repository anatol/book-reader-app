<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B21E8"/>
      <stop offset="50%" stop-color="#3B0EA6"/>
      <stop offset="100%" stop-color="#0E1A6E"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F72585"/>
      <stop offset="100%" stop-color="#B5179E"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="100%" stop-color="#4361EE"/>
    </linearGradient>
    <linearGradient id="orb3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BF1A8"/>
      <stop offset="100%" stop-color="#2CB67D"/>
    </linearGradient>
    <linearGradient id="glass-l" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="glass-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="spine-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bm-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F72585"/>
      <stop offset="100%" stop-color="#B5179E"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="400" height="400" rx="90"/>
    </clipPath>
    <clipPath id="left-clip">
      <rect x="18" y="88" width="156" height="242" rx="14"/>
    </clipPath>
    <clipPath id="right-clip">
      <rect x="226" y="88" width="156" height="242" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" rx="90" fill="url(#bg)"/>

  <!-- Color orbs -->
  <g clip-path="url(#icon-clip)">
    <circle cx="80" cy="90" r="130" fill="url(#orb1)" opacity="0.55"/>
    <circle cx="350" cy="320" r="140" fill="url(#orb2)" opacity="0.5"/>
    <circle cx="320" cy="70" r="100" fill="url(#orb3)" opacity="0.35"/>
    <circle cx="50" cy="360" r="90" fill="#4361EE" opacity="0.3"/>
  </g>

  <!-- Left glass panel -->
  <g clip-path="url(#icon-clip)">
    <rect x="18" y="88" width="156" height="242" rx="14"
          fill="url(#glass-l)" stroke="white" stroke-width="1" stroke-opacity="0.45"/>
    <rect x="18" y="88" width="156" height="80" rx="14"
          fill="url(#shine)" opacity="0.5" clip-path="url(#left-clip)"/>
    <rect x="36" y="136" width="100" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="36" y="150" width="80" height="2" rx="1" fill="white" opacity="0.35"/>
    <rect x="36" y="164" width="95" height="2" rx="1" fill="white" opacity="0.45"/>
    <rect x="36" y="178" width="65" height="2" rx="1" fill="white" opacity="0.3"/>
    <rect x="36" y="192" width="90" height="2" rx="1" fill="white" opacity="0.42"/>
    <rect x="36" y="206" width="72" height="2" rx="1" fill="white" opacity="0.32"/>
    <rect x="36" y="228" width="98" height="2" rx="1" fill="white" opacity="0.48"/>
    <rect x="36" y="242" width="75" height="2" rx="1" fill="white" opacity="0.33"/>
    <rect x="36" y="256" width="88" height="2" rx="1" fill="white" opacity="0.43"/>
    <rect x="36" y="270" width="58" height="2" rx="1" fill="white" opacity="0.28"/>
    <rect x="36" y="284" width="85" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="36" y="298" width="70" height="2" rx="1" fill="white" opacity="0.3"/>
  </g>

  <!-- Right glass panel -->
  <g clip-path="url(#icon-clip)">
    <rect x="226" y="88" width="156" height="242" rx="14"
          fill="url(#glass-r)" stroke="white" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="226" y="88" width="156" height="70" rx="14"
          fill="url(#shine)" opacity="0.4" clip-path="url(#right-clip)"/>
    <rect x="244" y="136" width="102" height="2" rx="1" fill="white" opacity="0.45"/>
    <rect x="244" y="150" width="78" height="2" rx="1" fill="white" opacity="0.32"/>
    <rect x="244" y="164" width="96" height="2" rx="1" fill="white" opacity="0.42"/>
    <rect x="244" y="178" width="62" height="2" rx="1" fill="white" opacity="0.28"/>
    <rect x="244" y="192" width="92" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="244" y="206" width="70" height="2" rx="1" fill="white" opacity="0.3"/>
    <rect x="244" y="228" width="100" height="2" rx="1" fill="white" opacity="0.46"/>
    <rect x="244" y="242" width="73" height="2" rx="1" fill="white" opacity="0.32"/>
    <rect x="244" y="256" width="90" height="2" rx="1" fill="white" opacity="0.42"/>
    <rect x="244" y="270" width="55" height="2" rx="1" fill="white" opacity="0.26"/>
    <rect x="244" y="284" width="84" height="2" rx="1" fill="white" opacity="0.38"/>
    <rect x="244" y="298" width="68" height="2" rx="1" fill="white" opacity="0.28"/>
  </g>

  <!-- Spine -->
  <g clip-path="url(#icon-clip)">
    <rect x="174" y="80" width="52" height="258" rx="10"
          fill="url(#spine-g)" stroke="white" stroke-width="0.8" stroke-opacity="0.6"/>
    <rect x="174" y="80" width="52" height="90" rx="10" fill="white" opacity="0.2"/>
    <line x1="200" y1="88" x2="200" y2="330" stroke="white" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>

  <!-- Bookmark ribbon -->
  <g clip-path="url(#icon-clip)">
    <path d="M318 86 L318 158 L309 148 L300 158 L300 86 Z" fill="url(#bm-g)" opacity="0.92"/>
    <rect x="300" y="86" width="18" height="8" fill="white" opacity="0.25"/>
  </g>

  <!-- Outer ring -->
  <rect x="0" y="0" width="400" height="400" rx="90"
        fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Top gloss -->
  <g clip-path="url(#icon-clip)">
    <ellipse cx="200" cy="40" rx="160" ry="55" fill="white" opacity="0.08"/>
  </g>

  <!-- Sparkle dots -->
  <g clip-path="url(#icon-clip)">
    <circle cx="50" cy="50" r="3" fill="white" opacity="0.5"/>
    <circle cx="75" cy="70" r="1.8" fill="white" opacity="0.35"/>
    <circle cx="340" cy="48" r="3.5" fill="white" opacity="0.45"/>
    <circle cx="316" cy="68" r="2" fill="white" opacity="0.3"/>
    <circle cx="40" cy="360" r="2.5" fill="white" opacity="0.3"/>
    <circle cx="358" cy="355" r="3" fill="white" opacity="0.35"/>
    <circle cx="25" cy="330" r="1.8" fill="white" opacity="0.28"/>
    <circle cx="370" cy="120" r="2" fill="white" opacity="0.3"/>
  </g>
</svg>
